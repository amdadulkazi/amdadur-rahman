<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amdadul Rahman Hasim | Profile</title>
    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 0;
        }

        /* Card Container */
        .profile-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid #334155;
            max-width: 500px;
            width: 90%;
            animation: fadeIn 1s ease-in-out;
        }

        /* Image Gallery Container */
        .image-gallery {
            display: flex;
            gap: 15px;
            margin-bottom: 1.5rem;
            justify-content: center;
        }

        /* Photo Style */
        .profile-img {
            width: 50%;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
            border: 3px solid #38bdf8;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2);
        }

        /* Glowing Name Effect */
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        p {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        /* Button Style */
        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 0.8rem 2rem;
            background: linear-gradient(to right, #2563eb, #3b82f6);
            color: #fff;
            font-weight: 600;
            border-radius: 50px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="image-gallery">
            <img src="my photo1.jpeg" alt="Amdadul Photo 1" class="profile-img">
            <img src="my photo 2.jpeg" alt="Amdadul Photo 2" class="profile-img">
        </div>

        <h1>Amdadul Rahman Hasim</h1>
        <p>Welcome to my official website</p>
        <a href="#" class="btn">Explore More</a>
    </div>

</body>
</html>
